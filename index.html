<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Full-viewport canvas -->
  <canvas id="galaxy"></canvas>

  <!-- Top bar -->
  <header id="top-bar">
    <span class="hub-title">⬡ Agent Hub</span>
    <nav id="breadcrumb">Galaxy</nav>
    <div class="top-right">
      <button id="btn-refresh" title="Refresh data">↻ Refresh</button>
      <span id="last-updated" class="text-muted"></span>
    </div>
  </header>

  <!-- Quick-nav strip -->
  <div id="quick-nav">
    <button class="qn-btn" onclick="navigateTo('GALAXY')">⬡ Hub</button>
    <button class="qn-btn" id="qn-financial" onclick="navigateTo('AGENT_FINANCIAL')">📈 Financial</button>
    <button class="qn-btn" onclick="showDashboard()">☰ Dashboard</button>
  </div>

  <!-- Bottom bar -->
  <footer id="bottom-bar">
    <button id="btn-back" class="hidden">‹ Back</button>
    <span id="status-text" class="text-muted">Loading…</span>
    <span class="hint text-muted">Tap planet to explore</span>
  </footer>

  <!-- Side panel -->
  <aside id="side-panel" class="panel-hidden">
    <button id="panel-close">×</button>
    <div id="panel-content"></div>
  </aside>

  <!-- Welcome modal -->
  <div id="modal-overlay" class="hidden">
    <div id="welcome-modal">
      <h2 id="modal-title">Welcome to Agent Hub</h2>
      <p id="modal-stats"></p>
      <p class="text-muted modal-note">Navigate on your phone · Make changes on your computer</p>
      <button id="modal-close">Enter Hub</button>
    </div>
  </div>

  <!-- Error toast -->
  <div id="toast" class="hidden"></div>

  <!-- Dashboard panel -->
  <div id="dashboard-panel" class="hidden">
    <div id="dashboard-inner">
      <div id="dashboard-header">
        <h2>⬡ Agent Hub Dashboard</h2>
        <button id="dashboard-close" onclick="hideDashboard()">×</button>
      </div>

      <div id="dashboard-tabs">
        <button class="dash-tab active" onclick="showDashTab('overview')">Overview</button>
        <button class="dash-tab" onclick="showDashTab('methodology')">How It Works</button>
        <button class="dash-tab" onclick="showDashTab('sources')">Data Sources</button>
        <button class="dash-tab" onclick="showDashTab('scorers')">Scorers</button>
        <button class="dash-tab" onclick="showDashTab('backtest')">Backtest Results</button>
        <button class="dash-tab" onclick="showDashTab('forward')">Forward Test</button>
        <button class="dash-tab" onclick="showDashTab('limits')">Limitations</button>
      </div>

      <div id="dashboard-content">
        <!-- Filled dynamically by JS -->
      </div>
    </div>
  </div>

  <!-- Ticker list -->
  <div id="ticker-list-container" class="hidden">
    <div id="ticker-list-header">
      <input type="text" id="ticker-search"
             placeholder="🔍 Search tickers..."
             oninput="filterTickerList(this.value)">
      <div id="ticker-list-sort">
        Sort:
        <button class="sort-btn active" onclick="sortTickerList('da')">DA %</button>
        <button class="sort-btn" onclick="sortTickerList('name')">Name</button>
        <button class="sort-btn" onclick="sortTickerList('windows')">Windows</button>
      </div>
    </div>
    <div id="ticker-list-body">
      <!-- Rows injected by JS -->
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav id="mobile-bottom-nav">
    <button class="mobile-nav-btn active" onclick="navigateTo('GALAXY')">
      <span class="mobile-nav-icon">🌌</span>
      <span class="mobile-nav-label">Hub</span>
      <span class="notification-dot" id="dot-hub"></span>
    </button>
    <button class="mobile-nav-btn" id="mnav-financial" onclick="navigateTo('AGENT_FINANCIAL')">
      <span class="mobile-nav-icon">📈</span>
      <span class="mobile-nav-label">Financial</span>
      <span class="notification-dot" id="dot-financial"></span>
    </button>
    <button class="mobile-nav-btn" onclick="showDashboard()">
      <span class="mobile-nav-icon">🤖</span>
      <span class="mobile-nav-label">Agents</span>
      <span class="notification-dot" id="dot-agents"></span>
    </button>
    <button class="mobile-nav-btn" onclick="showMorningSummary()">
      <span class="mobile-nav-icon">☀️</span>
      <span class="mobile-nav-label">Morning</span>
      <span class="notification-dot" id="dot-morning"></span>
    </button>
  </nav>

  <!-- Morning summary panel -->
  <div id="morning-summary" class="hidden">
    <div id="morning-summary-inner">
      <div id="morning-summary-header">
        <h2>☀️ Morning Briefing</h2>
        <button id="morning-summary-close" onclick="hideMorningSummary()">×</button>
      </div>
      <div id="morning-summary-content">
        <!-- Filled dynamically by JS -->
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
